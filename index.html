<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Tagua - Chiquinquirá</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e9ecef; display: flex; justify-content: center; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #495057; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; padding: 12px; border: none; width: 100%; border-radius: 6px; font-size: 16px; font-weight: bold; margin-top: 25px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Registro de Inventario</h2>
        <form>
            <label>Nombre de la Artesanía:</label>
            <input type="text" placeholder="Ej. Collar de Tagua">
            
            <label>Categoría:</label>
            <select>
                <option>Bisutería</option>
                <option>Figuras Talladas</option>
                <option>Accesorios del Hogar</option>
            </select>
            
            <label>Cantidad en Stock:</label>
            <input type="number" placeholder="0">
            
            <button type="button">Guardar Registro</button>
        </form>
    </div>
</body>
</html>
